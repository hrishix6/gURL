          <section class="flex-1 p-2 flex flex-col gap-2 overflow-hidden">
              <div class="flex gap-2">
                <div class="max-w-24">
                <select class="select">
                  <option selected>GET</option>
                  <option>POST</option>
                  <option>DELETE</option>
                  <option>PATCH</option>
                  <option>PUT</option>
                  <option>OPTIONS</option>
                  <option>HEAD</option>
                </select>
                </div>
                <div class="flex-1">
                      <label class="input w-full">
                      @
                      <input type="text" class="grow" placeholder="https://example.com" />
                      </label>
                  </div>
                <button class="btn btn-primary  ">Send</button>
              </div>
              <div class="flex-1 flex flex-col gap-2 overflow-hidden">
                  <section class="flex-1 flex flex-col overflow-hidden">
                    <header>
                        <app-tab [tabs]="requestFormTabs">

                        </app-tab>
                    </header>
                    <div class="flex-1 overflow-y-auto">
                      
                    </div>
                  </section>
                  <hr />
                  <section class="flex-1 flex flex-col gap-2 overflow-hidden">
                      <header class="flex justify-between items-center">
                          <app-tab [tabs]="responseTabs"></app-tab>
                          <div class="flex gap-2">
                              <div class="badge badge-lg badge-success">
                                200 OK
                              </div>
                            <div class="badge badge-lg badge-secondary">
                                35ms
                              </div>
                              <div class="badge badge-lg badge-secondary">

                          </div>

                     </div>
